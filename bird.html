<!DOCTYPE html>
<html>
<head>
    <title>Forest Bird Hunt Adventure</title>

    <style>
        .flex-container {
            display: flex;
            flex-direction: row;
            background-color: lightblue;
            margin: 10px;
        }

        .flex-container > div {
            background-color: #f1f1f1;
            margin: 10px;
            padding: 20px;
            font-size: 18px;
            border-radius: 8px;
        }

        header {
            text-align: center;
            font-size: 30px;
            margin: 20px;
        }

        @media (max-width: 600px) {
            .flex-container {
                flex-direction: column;
                background-color: lightgreen;
            }
        }
        .game-board {
            margin: 20px;
        }

        .row {
            display: flex;
            justify-content: center;
        }

        .location {
            margin: 5px;
        }

        .location img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>

<script>

var ids = [
"loc0","loc1","loc2","loc3","loc4","loc5","loc6",
"loc7","loc8","loc9","loc10","loc11","loc12","loc13",
"loc14","loc15","loc16","loc17","loc18","loc19","loc20",
"loc21","loc22","loc23","loc24","loc25","loc26","loc27",
"loc28","loc29","loc30","loc31","loc32","loc33","loc34"
]

var score = 0
var locationsVisited = 0
var lastLocation = 0

var statueLocation = 19
var toucanLocation = 14

var lorikeetLocations = [3,25]
var buntingLocations = [2,5,11,20,21]

var gameOver = false

function check(position){

    if(gameOver){
        return
    }

    var id = ids[position]
    var image = document.getElementById(id)

    if(position == statueLocation){
        image.src = "statue.jpg"
        score = score - 3
        gameOver = true
    }

    else if(position == toucanLocation){
        image.src = "toucan.jpg"
        score = score + 5
    }

    else if(lorikeetLocations.includes(position)){
        image.src = "lorikeet.jpg"
        score = score + 3
    }

    else if(buntingLocations.includes(position)){
        image.src = "bunting.jpg"
        score = score + 1
    }

    else{
        image.src = "bush.jpg"
    }

    image.onclick = function(){}

    locationsVisited = locationsVisited + 1

    document.getElementById("locations").innerHTML =
    "Number of locations checked is " + locationsVisited

    document.getElementById("score").innerHTML =
    "Score is " + score

    lastLocation = position
}

function help() {

    var result = "silence"

    var n1 = (lastLocation + 1) % 35
    var n2 = (lastLocation + 34) % 35
    var n3 = (lastLocation + 7) % 35
    var n4 = (lastLocation + 28) % 35

    if(buntingLocations.includes(n1) ||
       buntingLocations.includes(n2) ||
       buntingLocations.includes(n3) ||
       buntingLocations.includes(n4)){
        result = "cheep"
    }

    else{

        var row = Math.floor(lastLocation / 7)
        var col = lastLocation % 7

        for(var r = row-1; r <= row+1; r++){
            for(var c = col-1; c <= col+1; c++){

                if(r >= 0 && r < 5 && c >= 0 && c < 7){

                    var pos = r * 7 + c

                    if(pos == toucanLocation){
                        result = "caw"
                    }

                    if(pos == statueLocation){
                        result = "thrrum"
                    }
                }
            }
        }
    }

    document.getElementById("help").innerHTML = result
}

</script>

<body>

    <header>
        bird hunt
    </header>

    <div class="flex-container">
        <div>
            Click on the locations to find the birds, watch out for the forbidden statue
        </div>
    </div>

    <div class="flex-container">
        <div id="locations">
            Number of locations checked is zero.
        </div>

        <div id="score">
            Score is zero.
        </div>
    </div>

    <div class="flex-container">
        <div onclick="help()">
            Click for help.
        </div>

        <div>
            Help report
        </div>
    </div>

    <div class="game-board">

    <div class="row">
        <div class="location"><img src="bush.jpg" id="loc0" onclick="check(0)"></div>
        <div class="location"><img src="bush.jpg" id="loc1" onclick="check(1)"></div>
        <div class="location"><img src="bush.jpg" id="loc2" onclick="check(2)"></div>
        <div class="location"><img src="bush.jpg" id="loc3" onclick="check(3)"></div>
        <div class="location"><img src="bush.jpg" id="loc4" onclick="check(4)"></div>
        <div class="location"><img src="bush.jpg" id="loc5" onclick="check(5)"></div>
        <div class="location"><img src="bush.jpg" id="loc6" onclick="check(6)"></div>
    </div>

    <div class="row">
        <div class="location"><img src="bush.jpg" id="loc7" onclick="check(7)"></div>
        <div class="location"><img src="bush.jpg" id="loc8" onclick="check(8)"></div>
        <div class="location"><img src="bush.jpg" id="loc9" onclick="check(9)"></div>
        <div class="location"><img src="bush.jpg" id="loc10" onclick="check(10)"></div>
        <div class="location"><img src="bush.jpg" id="loc11" onclick="check(11)"></div>
        <div class="location"><img src="bush.jpg" id="loc12" onclick="check(12)"></div>
        <div class="location"><img src="bush.jpg" id="loc13" onclick="check(13)"></div>
    </div>

    <div class="row">
        <div class="location"><img src="bush.jpg" id="loc14" onclick="check(14)"></div>
        <div class="location"><img src="bush.jpg" id="loc15" onclick="check(15)"></div>
        <div class="location"><img src="bush.jpg" id="loc16" onclick="check(16)"></div>
        <div class="location"><img src="bush.jpg" id="loc17" onclick="check(17)"></div>
        <div class="location"><img src="bush.jpg" id="loc18" onclick="check(18)"></div>
        <div class="location"><img src="bush.jpg" id="loc19" onclick="check(19)"></div>
        <div class="location"><img src="bush.jpg" id="loc20" onclick="check(20)"></div>
    </div>

    <div class="row">
        <div class="location"><img src="bush.jpg" id="loc21" onclick="check(21)"></div>
        <div class="location"><img src="bush.jpg" id="loc22" onclick="check(22)"></div>
        <div class="location"><img src="bush.jpg" id="loc23" onclick="check(23)"></div>
        <div class="location"><img src="bush.jpg" id="loc24" onclick="check(24)"></div>
        <div class="location"><img src="bush.jpg" id="loc25" onclick="check(25)"></div>
        <div class="location"><img src="bush.jpg" id="loc26" onclick="check(26)"></div>
        <div class="location"><img src="bush.jpg" id="loc27" onclick="check(27)"></div>
    </div>

    <div class="row">
        <div class="location"><img src="bush.jpg" id="loc28" onclick="check(28)"></div>
        <div class="location"><img src="bush.jpg" id="loc29" onclick="check(29)"></div>
        <div class="location"><img src="bush.jpg" id="loc30" onclick="check(30)"></div>
        <div class="location"><img src="bush.jpg" id="loc31" onclick="check(31)"></div>
        <div class="location"><img src="bush.jpg" id="loc32" onclick="check(32)"></div>
        <div class="location"><img src="bush.jpg" id="loc33" onclick="check(33)"></div>
        <div class="location"><img src="bush.jpg" id="loc34" onclick="check(34)"></div>
    </div>

</div>

</body>
</html>
